name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    name: Type-check · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/background.js || { echo "Missing dist/background.js"; exit 1; }
          test -f dist/content.js || { echo "Missing dist/content.js"; exit 1; }
          test -f dist/manifest.json || { echo "Missing dist/manifest.json"; exit 1; }
          echo "Build artifacts verified."

      - name: Upload dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist-${{ github.sha }}
          path: dist/
          retention-days: 7
